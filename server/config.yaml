# mem0 Unified Infrastructure Configuration
# Coolify deployment — all REPLACE_WITH_* values are substituted by start.sh at runtime
version: "v1.1"

# Vector Layer: PostgreSQL 18 + pgvector (shared universal container)
vector_store:
  provider: "pgvector"
  config:
    host: "REPLACE_WITH_POSTGRES_HOST"
    port: 5432
    user: "REPLACE_WITH_POSTGRES_USER"
    password: "REPLACE_WITH_POSTGRES_PASSWORD"
    dbname: "REPLACE_WITH_POSTGRES_DB"
    collection_name: "REPLACE_WITH_POSTGRES_COLLECTION"
    embedding_model_dims: 768

# Graph Layer: Neo4j for relationship extraction
graph_store:
  provider: "neo4j"
  config:
    url: "REPLACE_WITH_NEO4J_URI"
    username: "REPLACE_WITH_NEO4J_USERNAME"
    password: "REPLACE_WITH_NEO4J_PASSWORD"

# Local Embedding Layer (HuggingFace/Nomic)
embedder:
  provider: "huggingface"
  config:
    model: "nomic-ai/nomic-embed-text-v1.5"
    embedding_dims: 768

# Logic Layer: OpenRouter (Gemini 2.0 Flash)
llm:
  provider: "openai"
  config:
    model: "google/gemini-2.0-flash-001"
    openai_base_url: "https://openrouter.ai/api/v1"
    api_key: "REPLACE_WITH_OPENROUTER_API_KEY"
    temperature: 0.1
    max_tokens: 1024
