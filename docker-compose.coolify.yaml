# Mem0 — Coolify Production Compose
# Deploys: mem0 API + Neo4j
# Depends on: existing Postgres container (uv89q3n3mvv7y4ttzf0g1w8q) on coolify network
#
# Coolify FQDN: https://mem0.thecrowbarcrew.cc → mem0:8000

services:
  mem0:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: mem0-api
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      # Postgres (shared universal container)
      - POSTGRES_HOST=uv89q3n3mvv7y4ttzf0g1w8q
      - POSTGRES_PORT=5432
      - POSTGRES_DB=mem0_db
      - POSTGRES_USER=mem0_user
      - POSTGRES_PASSWORD=mem0_8y2P$$jN3
      - POSTGRES_COLLECTION_NAME=memories
      # Neo4j (graph store)
      - NEO4J_URI=bolt://mem0-neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=mem0_neo4j_secure_pass
      # LLM via OpenRouter
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      # API auth
      - ADMIN_API_KEY=${ADMIN_API_KEY}
      # Python
      - PYTHONUNBUFFERED=1
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - mem0_history:/app/history
    networks:
      - coolify
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  neo4j:
    image: neo4j:5.26.4
    container_name: mem0-neo4j
    restart: unless-stopped
    environment:
      - NEO4J_AUTH=neo4j/mem0_neo4j_secure_pass
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_apoc_import_file_enabled=true
      - NEO4J_apoc_import_file_use__neo4j__config=true
      # Memory tuning for shared VPS
      - NEO4J_server_memory_heap_initial__size=256m
      - NEO4J_server_memory_heap_max__size=512m
      - NEO4J_server_memory_pagecache_size=128m
    volumes:
      - neo4j_data:/data
    networks:
      - coolify
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 90s

volumes:
  mem0_history:
    driver: local
  neo4j_data:
    driver: local

networks:
  coolify:
    external: true
